<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理后台 | 留服助手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #fef9e8 0%, #f5e6d3 100%);
            padding: 30px 20px;
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(100, 60, 20, 0.08);
        }
        h1 { color: #c17a3a; margin-bottom: 8px; }
        .subtitle { color: #a0724a; margin-bottom: 25px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #f0d9b5;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #d98c2f;
        }
        .stat-label { color: #a0724a; font-size: 14px; margin-top: 8px; }
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #f0d9b5;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #f0d9b5;
            vertical-align: top;
        }
        th { background: #f5e6d3; color: #5c3e1f; font-weight: 600; }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-approved { background: #4caf50; color: white; }
        .status-pending { background: #ff9800; color: white; }
        .status-rejected { background: #f44336; color: white; }
        .link-url { max-width: 280px; word-break: break-all; }
        .link-url a { color: #d98c2f; text-decoration: none; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn-admin {
            padding: 8px 20px;
            background: #f0d9b5;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab-btn-admin.active { background: #d98c2f; color: white; }
        .refresh-btn {
            float: right;
            padding: 6px 16px;
            background: #d98c2f;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar input, .filter-bar select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #f0d9b5;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #d98c2f;
            text-decoration: none;
        }
        .server-status {
            display: inline-block;
            margin-left: 20px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .server-online { background: #4caf50; color: white; }
        .server-offline { background: #f44336; color: white; }
        .action-buttons button {
            margin: 2px;
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-view { background: #2196f3; color: white; }
        .btn-delete { background: #f44336; color: white; }
        .verdict-reasonable { color: #4caf50; font-weight: bold; }
        .verdict-partial { color: #ff9800; font-weight: bold; }
        .verdict-unreasonable { color: #f44336; font-weight: bold; }
        .info-text { color: #666; font-size: 12px; margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>🤖 AI 自动化知识库管理后台</h1>
        <p class="subtitle">AI 自动判定链接有效性 | 管理员仅查看数据，无需手动审核</p>
        <div id="serverStatus" style="margin-bottom: 15px;"></div>

        <div class="stats-grid" id="stats">
            <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">总反馈数</div></div>
            <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">✅ 已采用</div></div>
            <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">⏳ 待观察</div></div>
            <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">❌ 已拒绝</div></div>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn-admin active" data-tab="feedback">📋 所有用户反馈</button>
            <button class="tab-btn-admin" data-tab="knowledge">⭐ 知识库（已采用）</button>
        </div>

        <div class="filter-bar">
            <select id="statusFilter">
                <option value="all">全部状态</option>
                <option value="approved">✅ 已采用</option>
                <option value="pending">⏳ 待观察</option>
                <option value="rejected">❌ 已拒绝</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索学校或专业...">
            <button onclick="loadData()" class="refresh-btn">🔄 刷新</button>
            <button onclick="exportData()" class="refresh-btn" style="background: #2196f3;">📥 导出数据</button>
        </div>

        <!-- 反馈链接表格 -->
        <div id="feedbackTab" class="table-container">
            <table style="min-width: 1000px;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>学校</th>
                        <th>目标专业</th>
                        <th>链接</th>
                        <th>AI判定</th>
                        <th>最终状态</th>
                        <th>判定理由</th>
                        <th>提交时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="feedbackTableBody">
                    <tr><td colspan="9">加载中...</td></tr>
                </tbody>
            </table>
            <div class="info-text">
                🤖 AI 自动判定规则：<br>
                • 「合理」→ 自动采用，直接进入知识库<br>
                • 「部分合理」→ 待观察，暂不进入知识库<br>
                • 「不合理」→ 自动拒绝
            </div>
        </div>

        <!-- 知识库表格 -->
        <div id="knowledgeTab" class="table-container" style="display:none;">
            <table style="min-width: 800px;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>学校</th>
                        <th>专业</th>
                        <th>链接</th>
                        <th>AI判定</th>
                        <th>判定理由</th>
                        <th>加入时间</th>
                    </tr>
                </thead>
                <tbody id="knowledgeTableBody">
                    <tr><td colspan="7">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        let currentTab = 'feedback';

        function formatStatus(status) {
            switch(status) {
                case 'approved': return '<span class="status-badge status-approved">✅ 已采用</span>';
                case 'pending': return '<span class="status-badge status-pending">⏳ 待观察</span>';
                case 'rejected': return '<span class="status-badge status-rejected">❌ 已拒绝</span>';
                default: return '<span class="status-badge status-pending">未知</span>';
            }
        }

        function formatAiJudgment(judgment) {
            switch(judgment) {
                case '合理': return '<span class="verdict-reasonable">✅ 合理</span>';
                case '部分合理': return '<span class="verdict-partial">⚠️ 部分合理</span>';
                case '不合理': return '<span class="verdict-unreasonable">❌ 不合理</span>';
                default: return judgment || '未知';
            }
        }

        // 检查服务器
        async function checkServerStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                if (response.ok) {
                    document.getElementById('serverStatus').innerHTML = '<span class="server-status server-online">✅ 后端服务已连接 | AI 自动判定已启用</span>';
                    return true;
                }
            } catch (e) {
                document.getElementById('serverStatus').innerHTML = '<span class="server-status server-offline">❌ 后端服务未启动，请运行 cd server && npm run dev</span>';
                return false;
            }
            return false;
        }

        // Tab切换
        document.querySelectorAll('.tab-btn-admin').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn-admin').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                document.getElementById('feedbackTab').style.display = currentTab === 'feedback' ? 'block' : 'none';
                document.getElementById('knowledgeTab').style.display = currentTab === 'knowledge' ? 'block' : 'none';
                loadData();
            });
        });

        async function loadData() {
            const isOnline = await checkServerStatus();
            if (!isOnline) return;
            
            if (currentTab === 'feedback') await loadFeedbackLinks();
            else if (currentTab === 'knowledge') await loadKnowledgeBase();
            await loadStats();
        }

        async function loadFeedbackLinks() {
            const status = document.getElementById('statusFilter')?.value || 'all';
            const search = document.getElementById('searchInput')?.value || '';
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/feedback?status=${status}&search=${encodeURIComponent(search)}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                const tbody = document.getElementById('feedbackTableBody');
                if (!data.links || data.links.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9">暂无数据</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.links.map(link => `
                    <tr>
                        <td>${link.id}</td>
                        <td><strong>${escapeHtml(link.university_name)}</strong></td>
                        <td>${escapeHtml(link.target_major || '-')}</td>
                        <td class="link-url"><a href="${escapeHtml(link.link_url)}" target="_blank">${escapeHtml(link.link_url.substring(0, 60))}...</a></td>
                        <td>${formatAiJudgment(link.ai_judgment)}</td>
                        <td>${formatStatus(link.status)}</td>
                        <td style="max-width: 300px;">${escapeHtml(link.judgment_reason || '-')}</td>
                        <td>${new Date(link.created_at).toLocaleString()}</td>
                        <td class="action-buttons">
                            <button class="btn-view" onclick="window.open('${escapeHtml(link.link_url)}', '_blank')">🔗 打开链接</button>
                            <button class="btn-delete" onclick="deleteLink(${link.id})">🗑 删除</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('feedbackTableBody').innerHTML = `<tr><td colspan="9">加载失败: ${error.message}</td></tr>`;
            }
        }

        async function loadKnowledgeBase() {
            try {
                const response = await fetch(`${API_BASE}/api/knowledge?limit=50`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                const tbody = document.getElementById('knowledgeTableBody');
                if (!data.links || data.links.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7">暂无知识库数据（AI 判定为「合理」的链接会自动加入）</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.links.map(kb => `
                    <tr>
                        <td>${kb.id}</td>
                        <td><strong>${escapeHtml(kb.university_name)}</strong></td>
                        <td>${escapeHtml(kb.target_major || '-')}</td>
                        <td class="link-url"><a href="${escapeHtml(kb.link_url)}" target="_blank">${escapeHtml(kb.link_url.substring(0, 60))}...</a></td>
                        <td>${formatAiJudgment(kb.ai_judgment)}</td>
                        <td style="max-width: 300px;">${escapeHtml(kb.judgment_reason || '-')}</td>
                        <td>${new Date(kb.created_at).toLocaleString()}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/stats`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${data.total_feedback || 0}</div><div class="stat-label">总反馈数</div></div>
                    <div class="stat-card"><div class="stat-number">${data.approved || 0}</div><div class="stat-label">✅ 已采用</div></div>
                    <div class="stat-card"><div class="stat-number">${data.pending || 0}</div><div class="stat-label">⏳ 待观察</div></div>
                    <div class="stat-card"><div class="stat-number">${data.rejected || 0}</div><div class="stat-label">❌ 已拒绝</div></div>
                `;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        async function deleteLink(linkId) {
            if (!confirm('确定要删除这条记录吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/delete-link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ link_id: linkId })
                });
                const result = await response.json();
                if (result.success) {
                    alert('删除成功');
                    loadData();
                } else {
                    alert('删除失败：' + result.error);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        function exportData() {
            // 导出当前表格数据为 CSV
            const table = currentTab === 'feedback' ? document.getElementById('feedbackTableBody') : document.getElementById('knowledgeTableBody');
            const rows = table.querySelectorAll('tr');
            let csv = '';
            
            if (currentTab === 'feedback') {
                csv = 'ID,学校,目标专业,链接,AI判定,最终状态,判定理由,提交时间\n';
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 8 && !cells[0].innerText.includes('暂无数据')) {
                        const rowData = [
                            cells[0].innerText,
                            cells[1].innerText,
                            cells[2].innerText,
                            cells[3].innerText,
                            cells[4].innerText.replace(/[✅⚠️❌]/g, '').trim(),
                            cells[5].innerText,
                            cells[6].innerText,
                            cells[7].innerText
                        ].map(cell => `"${cell.replace(/"/g, '""')}"`).join(',');
                        csv += rowData + '\n';
                    }
                });
            } else {
                csv = 'ID,学校,专业,链接,AI判定,判定理由,加入时间\n';
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 7 && !cells[0].innerText.includes('暂无数据')) {
                        const rowData = [
                            cells[0].innerText,
                            cells[1].innerText,
                            cells[2].innerText,
                            cells[3].innerText,
                            cells[4].innerText.replace(/[✅⚠️❌]/g, '').trim(),
                            cells[5].innerText,
                            cells[6].innerText
                        ].map(cell => `"${cell.replace(/"/g, '""')}"`).join(',');
                        csv += rowData + '\n';
                    }
                });
            }
            
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `留服助手_${currentTab}_${new Date().toISOString().slice(0,19)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 监听筛选变化
        document.getElementById('statusFilter')?.addEventListener('change', () => loadData());
        document.getElementById('searchInput')?.addEventListener('input', () => loadData());

        // 初始化
        checkServerStatus().then(() => {
            if (document.getElementById('serverStatus').innerHTML.includes('✅')) {
                loadData();
            }
        });
    </script>
</body>
</html>
